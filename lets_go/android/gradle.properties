org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.vfs.watch=true
org.gradle.workers.max=4

android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdk=36
android.javaCompile.suppressSourceTargetDeprecationWarning=true
android.enableAapt2Daemon=false

# Use Gradle/Kotlin defaults (no special OneDrive workarounds needed)
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.useFallbackStrategy=false

# Explicit Flutter SDK version targets for Android (match app/build.gradle.kts)
flutter.minSdkVersion=21
flutter.targetSdkVersion=34
