{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Admin{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'administration/ride-sharing-logo-black-and-white.png' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="{% static 'administration/style.css' %}">
  {% block head_extra %}{% endblock %}
</head>
<body class="admin-body">
  <input id="admin-nav-toggle" class="admin-nav-toggle" type="checkbox" />

  <header class="admin-header">
    <div class="admin-header-left">
      <label class="admin-burger" for="admin-nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <a class="admin-brand" href="{% url 'administration:admin_view' %}">
        <img class="admin-brand-logo" src="{% static 'administration/white-only-transparent-icon.png' %}" alt="Lets Go" />
        <span class="admin-brand-text">Lets Go Admin</span>
      </a>
    </div>

    <div class="admin-header-right">
      <button type="button" class="admin-toplink" id="admin-todos-panel-open">
        <i class="fa-regular fa-square-check"></i> Todos
      </button>
      <a class="admin-toplink" href="{% url 'administration:logout_view' %}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
    </div>
  </header>

  <aside class="admin-sidebar">
    <nav class="admin-nav">
      <a class="admin-nav-link" href="{% url 'administration:admin_view' %}"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
      <a class="admin-nav-link" href="{% url 'administration:rides_dashboard' %}"><i class="fa-solid fa-route"></i> Rides</a>
      <a class="admin-nav-link" href="{% url 'administration:reached_overdue_dashboard' %}"><i class="fa-regular fa-clock"></i> Reached Pending</a>
      <a class="admin-nav-link" href="{% url 'administration:sos_dashboard' %}"><i class="fa-solid fa-triangle-exclamation"></i> SOS Incidents</a>
      <a class="admin-nav-link" href="{% url 'administration:user_list' %}"><i class="fa-solid fa-users"></i> Users</a>
      <a class="admin-nav-link" href="{% url 'administration:change_requests_list' %}"><i class="fa-solid fa-code-pull-request"></i> Change Requests</a>
      <a class="admin-nav-link" href="{% url 'administration:guest_list' %}"><i class="fa-regular fa-comments"></i> Guest Support</a>
      <!-- <a class="admin-nav-link" href="{% url 'administration:analytics_view' %}"><i class="fa-solid fa-chart-line"></i> Analytics</a> -->
      <!-- <a class="admin-nav-link" href="{% url 'administration:settings_view' %}"><i class="fa-solid fa-gear"></i> Settings</a> -->
    </nav>
  </aside>

  <main class="admin-main">
    {% block content %}{% endblock %}
  </main>

  <div class="admin-panel-overlay" id="admin-panel-overlay" hidden></div>
  <aside class="admin-panel" id="admin-todos-panel" aria-hidden="true">
    <div class="admin-panel-header">
      <div class="admin-panel-title"><i class="fa-regular fa-square-check"></i> Todos</div>
      <button type="button" class="admin-panel-close" id="admin-todos-panel-close" aria-label="Close">&times;</button>
    </div>
    <div class="admin-panel-body" id="admin-todos-panel-body">
      <div class="admin-panel-loading">Loading...</div>
    </div>
  </aside>

  <label class="admin-overlay" for="admin-nav-toggle" aria-label="Close navigation"></label>

  <script src="{% static 'administration/admin_forms.js' %}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const currentPath = window.location.pathname.replace(/\/+$/, '') || '/';
      const links = Array.from(document.querySelectorAll('.admin-nav-link'));

      let best = null;
      let bestLen = -1;
      for (const a of links) {
        let p = '';
        try {
          p = new URL(a.href, window.location.origin).pathname;
        } catch (e) {
          continue;
        }
        p = p.replace(/\/+$/, '') || '/';
        if (currentPath === p || (p !== '/' && currentPath.startsWith(p + '/')) || (p !== '/' && currentPath.startsWith(p))) {
          if (p.length > bestLen) {
            best = a;
            bestLen = p.length;
          }
        }
      }
      if (best) best.classList.add('active');

      const navToggle = document.getElementById('admin-nav-toggle');
      for (const a of links) {
        a.addEventListener('click', () => {
          if (navToggle) navToggle.checked = false;
        });
      }

      const panel = document.getElementById('admin-todos-panel');
      const panelBody = document.getElementById('admin-todos-panel-body');
      const openBtn = document.getElementById('admin-todos-panel-open');
      const closeBtn = document.getElementById('admin-todos-panel-close');
      const overlay = document.getElementById('admin-panel-overlay');

      const showPanel = () => {
        if (!panel || !overlay) return;
        panel.classList.add('open');
        panel.setAttribute('aria-hidden', 'false');
        overlay.hidden = false;
      };

      const hidePanel = () => {
        if (!panel || !overlay) return;
        panel.classList.remove('open');
        panel.setAttribute('aria-hidden', 'true');
        overlay.hidden = true;
      };

      const loadPanelUrl = async (url, options) => {
        if (!panelBody) return;
        try {
          panelBody.innerHTML = '<div class="admin-panel-loading">Loading...</div>';
          const res = await fetch(url, options || { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
          const html = await res.text();
          panelBody.innerHTML = html;
        } catch (e) {
          panelBody.innerHTML = '<div class="admin-panel-loading">Failed to load.</div>';
        }
      };

      if (openBtn) {
        openBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          showPanel();
          await loadPanelUrl('{% url "administration:todos_inbox" %}?embed=1');
        });
      }

      if (closeBtn) closeBtn.addEventListener('click', () => hidePanel());
      if (overlay) overlay.addEventListener('click', () => hidePanel());

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') hidePanel();
      });

      if (panelBody) {
        panelBody.addEventListener('click', async (e) => {
          const a = e.target.closest('a');
          if (!a) return;
          const href = a.getAttribute('href');
          if (!href) return;
          if (href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('tel:')) return;

          const panelNav = a.getAttribute('data-panel-nav');
          if (panelNav === 'main') {
            e.preventDefault();
            hidePanel();
            window.location.href = href;
            return;
          }

          e.preventDefault();
          const url = new URL(href, window.location.origin);
          url.searchParams.set('embed', '1');
          await loadPanelUrl(url.toString());
        });

        panelBody.addEventListener('submit', async (e) => {
          const form = e.target;
          if (!form || form.tagName !== 'FORM') return;
          e.preventDefault();
          const method = (form.getAttribute('method') || 'GET').toUpperCase();
          const action = form.getAttribute('action') || window.location.href;
          const formData = new FormData(form);

          if (method === 'GET') {
            const url = new URL(action, window.location.origin);
            for (const [k, v] of formData.entries()) url.searchParams.set(k, v);
            url.searchParams.set('embed', '1');
            await loadPanelUrl(url.toString());
            return;
          }

          const url = new URL(action, window.location.origin);
          url.searchParams.set('embed', '1');
          await loadPanelUrl(url.toString(), {
            method,
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
          });
        });
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
